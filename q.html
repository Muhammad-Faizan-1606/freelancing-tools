<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellshave â€” Creative Brief OS</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --void: #000;
            --ink: #080808;
            --deep: #0e0e0e;
            --slate: #141414;
            --panel: #1a1a1a;
            --lift: #222;
            --edge: #2c2c2c;
            --b0: rgba(255, 255, 255, .04);
            --b1: rgba(255, 255, 255, .09);
            --b2: rgba(255, 255, 255, .16);
            --b3: rgba(255, 255, 255, .28);
            --white: #fff;
            --off: #f0f0f0;
            --mu: #666;
            --mu2: #999;
            --mu3: #bbb;
            --gold: #c8a84b;
            --gold-hi: #e8c86e;
            --gold-lo: #8a6d28;
            --gold-glow: rgba(200, 168, 75, .15);
            --gold-rim: rgba(200, 168, 75, .35);
            --font: 'Montserrat', sans-serif;
            --ease: cubic-bezier(.16, 1, .3, 1)
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html,
        body {
            height: 100%;
            font-family: var(--font);
            background: var(--ink);
            color: var(--white);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: .6
        }

        .topbar {
            height: 64px;
            background: rgba(8, 8, 8, .96);
            backdrop-filter: blur(32px) saturate(1.4);
            -webkit-backdrop-filter: blur(32px) saturate(1.4);
            border-bottom: 1px solid var(--b1);
            display: flex;
            align-items: center;
            padding: 0 28px;
            gap: 20px;
            position: sticky;
            top: 0;
            z-index: 100
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            text-decoration: none
        }

        .brand-logo {
            height: 28px;
            width: auto
        }

        .brand-divider {
            width: 1px;
            height: 22px;
            background: var(--b2);
            flex-shrink: 0
        }

        .brand-sub {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 3.5px;
            text-transform: uppercase;
            color: var(--mu2)
        }

        .vl {
            width: 1px;
            height: 24px;
            background: var(--b1);
            flex-shrink: 0
        }

        .tabs {
            display: flex;
            gap: 2px;
            flex: 1;
            overflow-x: auto;
            scrollbar-width: none
        }

        .tabs::-webkit-scrollbar {
            display: none
        }

        .tab {
            position: relative;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--mu);
            cursor: pointer;
            white-space: nowrap;
            transition: color .2s var(--ease), background .2s;
            border: 1px solid transparent
        }

        .tab:hover {
            color: var(--mu3);
            background: rgba(255, 255, 255, .03)
        }

        .tab.on {
            color: var(--white);
            background: rgba(255, 255, 255, .05);
            border-color: var(--b2)
        }

        .tab.on::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 1px;
            background: var(--gold);
            border-radius: 2px
        }

        .tab .dot {
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--gold);
            margin-left: 5px;
            vertical-align: middle;
            opacity: 0;
            transition: opacity .2s
        }

        .tab.filled .dot {
            opacity: 1
        }

        .btn-export {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 10px 20px;
            border: 1px solid var(--gold-rim);
            border-radius: 4px;
            background: transparent;
            color: var(--gold);
            cursor: pointer;
            transition: all .25s var(--ease);
            flex-shrink: 0
        }

        .btn-export:hover {
            background: var(--gold-glow);
            border-color: var(--gold);
            color: var(--gold-hi);
            box-shadow: 0 0 24px rgba(200, 168, 75, .12)
        }

        .btn-export svg {
            flex-shrink: 0
        }

        .export-wrap {
            position: relative;
            flex-shrink: 0
        }

        .export-menu {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: var(--deep);
            border: 1px solid var(--b2);
            border-radius: 4px;
            min-width: 200px;
            padding: 6px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, .7);
            opacity: 0;
            pointer-events: none;
            transform: translateY(-6px);
            transition: all .2s var(--ease);
            z-index: 200
        }

        .export-wrap.open .export-menu {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0)
        }

        .export-opt {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 3px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--mu3);
            border: none;
            background: none;
            width: 100%;
            transition: all .15s
        }

        .export-opt:hover {
            background: rgba(255, 255, 255, .05);
            color: var(--white)
        }

        .export-opt svg {
            flex-shrink: 0;
            opacity: .6
        }

        .export-opt:hover svg {
            opacity: 1
        }

        .export-opt.gold {
            color: var(--gold)
        }

        .export-opt.gold:hover {
            background: var(--gold-glow);
            color: var(--gold-hi)
        }

        .panel {
            display: none
        }

        .panel.on {
            display: block;
            animation: panelIn .5s var(--ease) both
        }

        @keyframes panelIn {
            from {
                opacity: 0;
                transform: translateY(10px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .mhero {
            position: relative;
            padding: 52px 40px 40px;
            border-bottom: 1px solid var(--b0);
            overflow: hidden
        }

        .mhero::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(200, 168, 75, .06) 0%, transparent 70%);
            pointer-events: none
        }

        .mhero-eyebrow {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px
        }

        .mhero-eyebrow::before {
            content: '';
            display: block;
            width: 24px;
            height: 1px;
            background: var(--gold-lo)
        }

        .mname {
            font-size: 56px;
            font-weight: 900;
            letter-spacing: -2.5px;
            line-height: .95;
            color: var(--white);
            text-transform: uppercase
        }

        .mname span {
            display: block;
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--mu2);
            margin-top: 8px
        }

        .mhero-meta {
            position: absolute;
            right: 40px;
            top: 52px;
            text-align: right
        }

        .mhero-year {
            font-size: 80px;
            font-weight: 900;
            letter-spacing: -4px;
            color: rgba(255, 255, 255, .03);
            line-height: 1;
            user-select: none
        }

        .theme-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            padding: 6px 16px;
            background: var(--gold-glow);
            border: 1px solid var(--gold-rim);
            border-radius: 2px;
            font-size: 10px;
            font-weight: 600;
            color: var(--gold-hi);
            letter-spacing: 1px
        }

        .theme-badge::before {
            content: '\25C6';
            font-size: 6px;
            color: var(--gold)
        }

        .progress-wrap {
            margin-top: 18px
        }

        .progress-label {
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--mu);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between
        }

        .progress-label span {
            color: var(--gold)
        }

        .progress-track {
            height: 3px;
            background: var(--edge);
            border-radius: 3px;
            overflow: hidden
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--gold-lo), var(--gold), var(--gold-hi));
            transition: width .6s var(--ease);
            box-shadow: 0 0 8px rgba(200, 168, 75, .3)
        }

        .content {
            display: grid;
            grid-template-columns: 300px 1fr 320px;
            gap: 0;
            min-height: calc(100vh - 64px - 160px)
        }

        .col-left {
            border-right: 1px solid var(--b0);
            padding: 32px 28px;
            background: var(--void)
        }

        .col-mid {
            padding: 32px;
            background: var(--ink)
        }

        .col-right {
            border-left: 1px solid var(--b0);
            padding: 32px 24px;
            background: rgba(0, 0, 0, .4)
        }

        .section-label {
            font-size: 8px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--mu);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--b1)
        }

        .prod-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 18px;
            height: 18px;
            padding: 0 5px;
            background: var(--gold);
            color: var(--void);
            font-size: 8px;
            font-weight: 900;
            border-radius: 9px;
            margin-left: 6px
        }

        .card {
            background: var(--deep);
            border: 1px solid var(--b1);
            border-radius: 2px;
            padding: 22px;
            margin-bottom: 12px;
            transition: border-color .2s;
            position: relative;
            overflow: hidden
        }

        .card:last-child {
            margin-bottom: 0
        }

        .card:hover {
            border-color: var(--b2)
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-lo), transparent);
            opacity: 0;
            transition: opacity .3s
        }

        .card:hover::before {
            opacity: 1
        }

        .card-title {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--white);
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .card-title .icon {
            font-size: 14px;
            line-height: 1
        }

        .card-desc {
            font-size: 10px;
            font-weight: 400;
            color: var(--mu);
            margin-bottom: 18px;
            line-height: 1.6
        }

        .sp-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px
        }

        .sp-slot {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border: 1px dashed var(--edge);
            border-radius: 2px;
            background: var(--slate);
            min-height: 56px;
            transition: all .2s;
            position: relative
        }

        .sp-slot.filled {
            border-style: solid;
            border-color: var(--b1);
            background: var(--panel)
        }

        .sp-slot.filled:hover {
            border-color: var(--b2)
        }

        .sp-img {
            width: 38px;
            height: 38px;
            background: var(--white);
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0
        }

        .sp-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 3px
        }

        .sp-badge {
            font-size: 7px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 2px
        }

        .sp-name {
            font-size: 10px;
            font-weight: 700;
            color: var(--white);
            line-height: 1.3
        }

        .sp-cat {
            font-size: 8px;
            font-weight: 500;
            color: var(--mu);
            margin-top: 1px;
            letter-spacing: 1px;
            text-transform: uppercase
        }

        .sp-empty {
            font-size: 10px;
            color: var(--mu);
            padding: 14px 0;
            text-align: center;
            letter-spacing: .5px
        }

        .sp-remove {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .06);
            border: 1px solid var(--b2);
            color: var(--mu);
            font-size: 9px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all .2s;
            line-height: 1
        }

        .sp-slot:hover .sp-remove {
            opacity: 1
        }

        .sp-remove:hover {
            background: rgba(220, 60, 60, .2);
            border-color: rgba(220, 60, 60, .5);
            color: #ff6b6b
        }

        .picker-divider {
            height: 1px;
            background: var(--b1);
            margin: 20px 0
        }

        .pf-row {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-bottom: 14px
        }

        .pfb {
            padding: 4px 11px;
            border-radius: 2px;
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: var(--slate);
            color: var(--mu);
            cursor: pointer;
            border: 1px solid var(--b1);
            transition: all .15s
        }

        .pfb:hover {
            color: var(--mu3);
            border-color: var(--b2)
        }

        .pfb.on {
            background: var(--gold-glow);
            color: var(--gold);
            border-color: var(--gold-rim)
        }

        .p-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            max-height: 460px;
            overflow-y: auto;
            padding-right: 2px
        }

        .p-grid::-webkit-scrollbar {
            width: 3px
        }

        .p-grid::-webkit-scrollbar-thumb {
            background: var(--b2);
            border-radius: 2px
        }

        .pc {
            background: var(--slate);
            border: 1px solid var(--b0);
            border-radius: 2px;
            padding: 10px 9px;
            cursor: pointer;
            transition: all .2s var(--ease);
            position: relative;
            overflow: hidden
        }

        .pc::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 60%, var(--gold-glow));
            opacity: 0;
            transition: opacity .2s
        }

        .pc:hover {
            border-color: var(--b2);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, .5)
        }

        .pc:hover::after {
            opacity: 1
        }

        .pc.on {
            border-color: var(--gold-rim);
            background: var(--panel);
            box-shadow: 0 0 0 1px var(--gold-lo), inset 0 0 20px rgba(200, 168, 75, .04)
        }

        .pc.on::before {
            content: '\2713';
            position: absolute;
            top: 6px;
            right: 7px;
            width: 16px;
            height: 16px;
            background: var(--gold);
            color: var(--void);
            font-size: 8px;
            font-weight: 900;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2
        }

        .pc-img {
            width: 100%;
            aspect-ratio: 1;
            background: var(--white);
            border-radius: 1px;
            margin-bottom: 9px;
            overflow: hidden
        }

        .pc-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 5px
        }

        .pc-name {
            font-size: 9px;
            font-weight: 700;
            color: var(--white);
            line-height: 1.3
        }

        .pc-cat {
            font-size: 7px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--mu);
            margin-top: 2px
        }

        .angle-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px
        }

        .angle-pill {
            padding: 9px 17px;
            border: 1px solid var(--b1);
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            color: var(--mu2);
            cursor: pointer;
            transition: all .18s var(--ease);
            background: var(--slate);
            user-select: none;
            letter-spacing: .3px
        }

        .angle-pill:hover {
            border-color: var(--b2);
            color: var(--white);
            background: var(--panel)
        }

        .angle-pill.on {
            background: var(--gold-glow);
            border-color: var(--gold-rim);
            color: var(--gold-hi);
            box-shadow: 0 0 12px rgba(200, 168, 75, .08);
            animation: anglePulse .5s ease-out
        }

        @keyframes anglePulse {
            0% {
                box-shadow: 0 0 0 0 rgba(200, 168, 75, .3)
            }

            70% {
                box-shadow: 0 0 0 8px rgba(200, 168, 75, 0)
            }

            100% {
                box-shadow: 0 0 0 0 rgba(200, 168, 75, 0)
            }
        }

        .input-box {
            width: 100%;
            background: var(--slate);
            border: 1px solid var(--b1);
            border-radius: 2px;
            padding: 14px 16px;
            font-family: var(--font);
            font-size: 12px;
            font-weight: 400;
            color: var(--white);
            outline: none;
            resize: vertical;
            min-height: 140px;
            line-height: 1.7;
            transition: border-color .2s, background .2s
        }

        .input-box::placeholder {
            color: var(--mu)
        }

        .input-box:focus {
            border-color: var(--gold-rim);
            background: rgba(200, 168, 75, .03);
            box-shadow: 0 0 0 3px rgba(200, 168, 75, .06)
        }

        .fmt-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px
        }

        .fmt-card {
            background: var(--slate);
            border: 1px solid var(--b1);
            border-radius: 2px;
            padding: 16px 10px;
            text-align: center;
            cursor: pointer;
            transition: all .2s var(--ease)
        }

        .fmt-card:hover {
            border-color: var(--b2);
            transform: translateY(-2px)
        }

        .fmt-card.on {
            border-color: var(--gold-rim);
            background: var(--gold-glow);
            box-shadow: 0 0 20px rgba(200, 168, 75, .1)
        }

        .fmt-icon {
            margin: 0 auto 12px;
            border: 1px solid var(--mu);
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--mu);
            font-size: 8px;
            font-weight: 800;
            letter-spacing: .5px;
            transition: all .2s
        }

        .fmt-card.on .fmt-icon {
            border-color: var(--gold);
            color: var(--gold)
        }

        .fmt-sq .fmt-icon {
            width: 32px;
            height: 32px
        }

        .fmt-ve .fmt-icon {
            width: 24px;
            height: 40px
        }

        .fmt-ba .fmt-icon {
            width: 40px;
            height: 22px
        }

        .fmt-name {
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--white)
        }

        .fmt-sub {
            font-size: 8px;
            font-weight: 500;
            color: var(--mu);
            margin-top: 3px;
            letter-spacing: .5px
        }

        .deliv-list {
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .deliv-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--slate);
            padding: 12px 16px;
            border: 1px solid var(--b0);
            border-radius: 2px;
            transition: border-color .2s
        }

        .deliv-row:hover {
            border-color: var(--b1)
        }

        .deliv-lbl {
            font-size: 10px;
            font-weight: 600;
            color: var(--mu3);
            letter-spacing: .5px
        }

        .stepper-wrap {
            display: flex;
            align-items: center;
            border: 1px solid var(--b2);
            border-radius: 2px;
            overflow: hidden
        }

        .stepper-btn {
            width: 28px;
            height: 32px;
            background: var(--slate);
            border: none;
            color: var(--mu2);
